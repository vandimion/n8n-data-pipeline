version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql-local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: yourpassword
      MYSQL_DATABASE: crypto_data
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - mysql

volumes:
  mysql_data:
  n8n_data: